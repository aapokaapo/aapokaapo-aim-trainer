<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halo Tracker - Add Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #333;
            border-radius: 4px;
            background-color: #2a2a2a;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #0078d7; /* Xbox Blue */
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #005a9e;
        }
        #status {
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }
        .success { color: #4caf50; }
        .error { color: #f44336; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Add Halo Player</h2>
        <input type="text" id="gamertag" placeholder="Enter Xbox Gamertag">
        <button onclick="submitPlayer()">Fetch & Add Player</button>
        <div id="status"></div>
    </div>

    <script>
        async function submitPlayer() {
            const gamertagInput = document.getElementById('gamertag').value.trim();
            const statusDiv = document.getElementById('status');
            
            if (!gamertagInput) {
                statusDiv.innerText = "Please enter a gamertag.";
                statusDiv.className = "error";
                return;
            }

            // Reset UI for loading
            statusDiv.innerText = "Searching Xbox Live & adding to DB...";
            statusDiv.className = "";

            try {
                // Ensure your FastAPI server is running on port 8045!
                const response = await fetch('/players/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    // Send the data exactly how our Pydantic model expects it
                    body: JSON.stringify({ gamertag: gamertagInput }) 
                });

                const data = await response.json();

                if (response.ok) {
                    statusDiv.innerText = `Success! Added ${data.gamertag} (XUID: ${data.xuid})`;
                    statusDiv.className = "success";
                    document.getElementById('gamertag').value = ''; // clear input
                } else {
                    // API returned an error (e.g. 400 or 404)
                    statusDiv.innerText = `Error: ${data.detail}`;
                    statusDiv.className = "error";
                }
            } catch (error) {
                statusDiv.innerText = "Network error. Is your FastAPI server running?";
                statusDiv.className = "error";
            }
        }
    </script>
</body>
</html>
